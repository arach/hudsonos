name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      # Build marketing site (Next.js)
      - name: Install marketing site dependencies
        run: bun install --frozen-lockfile

      - name: Build marketing site
        run: bun run build

      # Build docs site (Astro/Dewey)
      - name: Install docs dependencies
        working-directory: hudson-docs
        run: bun install

      - name: Build docs
        working-directory: hudson-docs
        run: bun run build

      # Merge outputs: marketing site + docs under /docs
      - name: Merge outputs
        run: cp -r hudson-docs/dist out/docs

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
